---
# decommission.yml — Permanently destroy the shared EC2 server and ALL its AWS resources
#
# ⚠  WARNING: DESTRUCTIVE AND IRREVERSIBLE
#
# Deletes (in order):
#   1. EC2 instance
#   2. EBS data volume          (survives instance termination — deleted here)
#   3. SSH key pair             (AWS + local ~/.ssh file + ~/.ssh/config entry)
#   4. Security group
#   5. IAM role, instance profile, and all inline policies
#   6. IAM deployer user        (LAST — invalidates current credentials)
#
# What is NOT deleted (app-level — each app manages its own):
#   - S3 buckets
#   - Secrets Manager entries
#   - CloudFront distributions
#   - CloudWatch log groups / alarms
#
# Recommended usage (uses decommission.sh wrapper for confirmation):
#   cd deployment
#   ./scripts/decommission.sh
#
# Direct usage (bypass wrapper):
#   ansible-playbook playbooks/decommission.yml \
#     --vault-password-file ~/.vault_pass \
#     -e decommission_confirmed=true

# ==============================================================================
# Safety gate
# ==============================================================================

- name: Confirm Decommission
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Require explicit confirmation flag
      fail:
        msg: |
          Run through the decommission wrapper script for safety:
            cd deployment && ./scripts/decommission.sh

          To bypass and run directly, pass: -e decommission_confirmed=true
      when: decommission_confirmed | default(false) | bool != true

    - name: Display decommission plan
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   ⚠  DECOMMISSIONING ALL RESOURCES - {{ host_name }}"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "  Region: {{ aws_region }}"
          - ""
          - "  Will delete:"
          - "    1. EC2 instance             (Name={{ host_name }})"
          - "    2. EBS data volume          ({{ ebs_data_volume_name }})"
          - "    3. SSH key pair             ({{ ssh_key_name }})"
          - "    4. Security group           ({{ security_group_name }})"
          - "    5. IAM role + profile       ({{ iam_role_name }})"
          - "    6. IAM deployer user        ({{ host_name }}-deployer)"
          - "       {{ '⚠  Will be DELETED — credentials become invalid after this.' if delete_deployer_user | default(false) | bool else '✓  Will be KEPT (credentials remain valid).' }}"
          - ""
          - "  Will NOT delete (app-level — manage from each app's repo):"
          - "    - S3 buckets"
          - "    - Secrets Manager entries"
          - "    - CloudFront / CloudWatch"
          - ""
          - "  Starting teardown..."

# ==============================================================================
# Step 1: Terminate EC2 instance
# ==============================================================================

- name: Step 1 — Terminate EC2 Instance
  import_playbook: terminate-ec2-instance.yml

# ==============================================================================
# Step 2: Delete EBS data volume
# ==============================================================================

- name: Step 2 — Delete EBS Data Volume
  import_playbook: delete-ebs-volume.yml

# ==============================================================================
# Step 3: Delete SSH key pair
# ==============================================================================

- name: Step 3 — Delete SSH Key Pair
  import_playbook: delete-ssh-key.yml

# ==============================================================================
# Step 4: Delete security group
# ==============================================================================

- name: Step 4 — Delete Security Group
  import_playbook: delete-security-group.yml

# ==============================================================================
# Step 5: Delete IAM role, policies, and instance profile
# ==============================================================================

- name: Step 5 — Delete IAM Role
  import_playbook: delete-iam-role.yml

# ==============================================================================
# Step 6: Delete IAM deployer user (LAST — invalidates current credentials)
# ==============================================================================

- name: Step 6 — Delete IAM Deployer User
  import_playbook: delete-iam-deployer-user.yml
  when: delete_deployer_user | default(false) | bool

# ==============================================================================
# Final cleanup
# ==============================================================================

- name: Decommission Complete
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Remove all instance info files from instances/
      shell: "rm -f {{ playbook_dir }}/../instances/*.txt"
      changed_when: false
      failed_when: false

    - name: Display decommission summary
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   ✓ Decommission Complete - {{ host_name }}"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "  Deleted:"
          - "    ✓ EC2 instance:     {{ host_name }}"
          - "    ✓ EBS data volume:  {{ ebs_data_volume_name }}"
          - "    ✓ SSH key pair:     {{ ssh_key_name }}"
          - "    ✓ Security group:   {{ security_group_name }}"
          - "    ✓ IAM role:         {{ iam_role_name }}"
          - "    ✓ Instance profile: {{ iam_instance_profile_name }}"
          - "    {{ '✓ Deployer user:    ' + host_name + '-deployer (credentials are now invalid)' if delete_deployer_user | default(false) | bool else '–  Deployer user:    ' + host_name + '-deployer (KEPT — credentials still valid)' }}"
          - ""
          - "  Reminder — delete these manually if no longer needed:"
          - "    - App S3 buckets  (managed by each app)"
          - "    - App secrets     (managed by each app)"
          - ""
          - "  To provision a new server:"
          - "    ansible-playbook playbooks/create-iam-deployer-user.yml"
          - "    ansible-playbook playbooks/provision-server.yml --vault-password-file ~/.vault_pass"
