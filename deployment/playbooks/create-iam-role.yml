---
# create-iam-role.yml — IAM role for a shared EC2 server
#
# Creates one IAM role that covers all applications running on this server.
# Named after iam_role_name (defined in vault.yml), not any specific app.
#
# Policies follow least-privilege:
#   S3              — only buckets matching {host_name}-* prefix
#   Secrets Manager — only secrets under {host_name}/* and {app_name}/* paths
#   CloudWatch      — metrics + logs (resource: * required by AWS; actions are scoped)
#   SNS             — only topics matching {host_name}-* prefix
#   SSM             — Session Manager (AWSManagedInstanceCore)
#   Serial Console  — emergency recovery access
#
# Usage: ansible-playbook playbooks/create-iam-role.yml \
#          --vault-password-file ~/.vault_pass

- name: Create IAM Role for Shared EC2 Server
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:

    # -------------------------------------------------------------------------
    # Resolve AWS account ID — used in all resource ARNs so policies are
    # account-scoped and cannot match resources in other AWS accounts.
    # -------------------------------------------------------------------------
    - name: Get AWS account ID
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: aws_account_id_raw
      changed_when: false

    - name: Set account ID fact
      set_fact:
        aws_account_id: "{{ aws_account_id_raw.stdout | trim }}"

    - name: Create IAM role
      amazon.aws.iam_role:
        name: "{{ iam_role_name }}"
        assume_role_policy_document:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: ec2.amazonaws.com
              Action: sts:AssumeRole
        # SSM Session Manager — allows console access without SSH key
        managed_policies:
          - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
        create_instance_profile: false
        delete_instance_profile: false
        purge_policies: false
        description: "IAM role for {{ host_name }} shared EC2 server - managed by Ansible"
        tags:
          Server: "{{ host_name }}"
          Environment: production
          ManagedBy: Ansible

    # -------------------------------------------------------------------------
    # S3 — scoped to buckets matching the {host_name}-* prefix only.
    # Each app should name its bucket {host_name}-{app_name} or similar.
    # To add a bucket outside this pattern, append its ARN to the Resource list.
    # -------------------------------------------------------------------------
    - name: Attach S3 access policy
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ iam_role_name }}"
        policy_name: "{{ iam_policy_s3 }}"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Sid: S3ObjectAccess
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:GetObjectVersion
                - s3:DeleteObjectVersion
              Resource: "arn:aws:s3:::{{ host_name }}-*/*"
            - Sid: S3BucketAccess
              Effect: Allow
              Action:
                - s3:ListBucket
                - s3:GetBucketLocation
                - s3:ListBucketVersions
              Resource: "arn:aws:s3:::{{ host_name }}-*"

    # -------------------------------------------------------------------------
    # Secrets Manager — scoped to secrets under {host_name}/* only.
    # Apps should namespace their secrets as {host_name}/{app_name}/...
    # AWS appends a 6-char random suffix to secret ARNs (hence trailing *).
    # -------------------------------------------------------------------------
    - name: Attach Secrets Manager access policy
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ iam_role_name }}"
        policy_name: "{{ iam_policy_secrets }}"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Sid: SecretsManagerAccess
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - secretsmanager:DescribeSecret
                - secretsmanager:CreateSecret
                - secretsmanager:PutSecretValue
                - secretsmanager:DeleteSecret
                - secretsmanager:TagResource
                - secretsmanager:ListSecrets
              Resource:
                - "arn:aws:secretsmanager:{{ aws_region }}:{{ aws_account_id }}:secret:{{ host_name }}/*"

    # -------------------------------------------------------------------------
    # CloudWatch — metrics and logs.
    # AWS does not support resource-level restrictions on PutMetricData or most
    # log actions, so Resource: "*" is required here. The actions are scoped to
    # only what the server needs (write + describe; no delete).
    # Log groups should be named /{host_name}/... by apps on this server.
    # -------------------------------------------------------------------------
    - name: Attach CloudWatch access policy
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ iam_role_name }}"
        policy_name: "{{ iam_policy_cloudwatch }}"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Sid: CloudWatchMetrics
              Effect: Allow
              Action:
                - cloudwatch:PutMetricData
                - cloudwatch:GetMetricData
                - cloudwatch:GetMetricStatistics
              Resource: "*"
            - Sid: CloudWatchLogs
              Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
                - logs:DescribeLogStreams
                - logs:DescribeLogGroups
              Resource:
                - "arn:aws:logs:{{ aws_region }}:{{ aws_account_id }}:log-group:/{{ host_name }}/*"
                - "arn:aws:logs:{{ aws_region }}:{{ aws_account_id }}:log-group:/{{ host_name }}/*:*"

    # -------------------------------------------------------------------------
    # SNS — scoped to topics matching the {host_name}-* prefix only.
    # -------------------------------------------------------------------------
    - name: Attach SNS publish policy
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ iam_role_name }}"
        policy_name: "{{ iam_policy_sns }}"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Sid: SNSPublish
              Effect: Allow
              Action:
                - sns:Publish
              Resource: "arn:aws:sns:{{ aws_region }}:{{ aws_account_id }}:{{ host_name }}-*"

    # -------------------------------------------------------------------------
    # EC2 Serial Console — emergency recovery without SSH key
    # -------------------------------------------------------------------------
    - name: Enable EC2 serial console access for this AWS account
      ansible.builtin.command:
        cmd: >
          aws ec2 enable-serial-console-access
          --region {{ aws_region }}
      register: serial_console_result
      changed_when: true
      ignore_errors: true

    - name: Attach EC2 serial console access policy
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ iam_role_name }}"
        policy_name: "{{ iam_policy_serial_console }}"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Sid: SerialConsoleAccess
              Effect: Allow
              Action:
                - ec2-instance-connect:SendSerialConsoleSSHPublicKey
              Resource: "arn:aws:ec2:{{ aws_region }}:{{ aws_account_id }}:instance/*"

    # -------------------------------------------------------------------------
    # Instance Profile — attaches the role to the EC2 instance
    # -------------------------------------------------------------------------
    - name: Create IAM instance profile
      amazon.aws.iam_instance_profile:
        name: "{{ iam_instance_profile_name }}"
        role: "{{ iam_role_name }}"
        state: present

    - name: Display IAM role summary
      debug:
        msg: |

          ✓ IAM Role:         {{ iam_role_name }}
            Account:          {{ aws_account_id }}
            Instance Profile: {{ iam_instance_profile_name }}

            Policies (least-privilege):
              {{ iam_policy_s3 }}
                S3 objects:   arn:aws:s3:::{{ host_name }}-*/*
                S3 buckets:   arn:aws:s3:::{{ host_name }}-*

              {{ iam_policy_secrets }}
                Secrets:      arn:aws:secretsmanager:...:secret:{{ host_name }}/*
                              (apps should namespace as {{ host_name }}/{app_name}/...)

              {{ iam_policy_cloudwatch }}
                Metrics:      resource:* (AWS requirement)
                Logs:         /{{ host_name }}/* log groups

              {{ iam_policy_sns }}
                Topics:       arn:aws:sns:{{ aws_region }}:{{ aws_account_id }}:{{ host_name }}-*

              {{ iam_policy_serial_console }}
                Instances:    arn:aws:ec2:{{ aws_region }}:{{ aws_account_id }}:instance/*

              SSM:            AmazonSSMManagedInstanceCore (AWS managed)
