---
# harden-server.yml — OS hardening and shared service foundation
#
# Run ONCE after launch-ec2-instance.yml to harden the OS and install
# the shared services (supervisor) that all apps will use.
#
# This playbook is SERVER-LEVEL only. It does not deploy any application,
# create nginx vhosts, install SSL certificates, or add supervisor programs.
# Those are app-level concerns handled by each app's own setup.yml.
#
# What this does:
#   - Full OS package upgrade
#   - EBS data volume format and mount at apps_root (/opt/apps)
#   - Shared log root directory (/var/log/apps)
#   - SSH hardening (key-only, no root, retries, timeouts, X11 off)
#   - Automatic security updates (unattended-upgrades)
#   - Kernel parameter hardening (sysctl — IP spoofing, SYN flood, etc.)
#   - Shared memory hardening (/run/shm noexec,nosuid)
#   - Fail2ban (SSH brute-force protection)
#   - UFW firewall (default deny ingress; allow 22, 80, 443)
#   - Disable unused services (apache2, avahi-daemon, cups, bluetooth)
#   - Supervisor (shared process manager, empty — apps add their programs)
#   - System logging (rsyslog + logrotate)
#
# NOTE: nginx is NOT installed here. Each app installs and configures nginx
#       as part of its own deployment (setup.yml in the app repo).
#
# Usage:
#   ansible-playbook playbooks/harden-server.yml \
#     --vault-password-file ~/.vault_pass

- name: Harden Server — OS Hardening and Shared Service Foundation
  hosts: all
  become: yes
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  vars:
    system_packages:
      # Core utilities
      - curl
      - wget
      - git
      - unzip
      - htop
      - tree
      - jq
      - net-tools
      # Security
      - ufw
      - fail2ban
      - unattended-upgrades
      - apt-listchanges
      # Process management
      - supervisor
      # Python runtime
      - python3
      - python3-pip
      - python3-venv
      # Logging
      - rsyslog
      - logrotate
      # Filesystem / EBS tools
      - nvme-cli
      - xfsprogs
      - e2fsprogs

  pre_tasks:

    # =========================================================================
    # WAIT FOR CONNECTION
    # The instance may still be running cloud-init when this playbook starts.
    # Wait up to 10 minutes before giving up; retry every 15 seconds.
    # =========================================================================

    - name: Wait for SSH to become available
      wait_for_connection:
        delay: 10
        sleep: 15
        timeout: 600
      register: wait_result

    - name: Gather facts (after connection is confirmed)
      gather_facts:

  tasks:

    # =========================================================================
    # DEPLOYER IP — detect before any hardening so it can be whitelisted
    # in UFW and fail2ban, preventing lockout during or after deployment.
    # =========================================================================

    - name: Get deployer public IPv4 address
      command: curl -4 -s --max-time 10 ifconfig.me
      register: deployer_ip_raw
      delegate_to: localhost
      become: no
      changed_when: false

    - name: Set deployer IP fact
      set_fact:
        deployer_ip: "{{ deployer_ip_raw.stdout | trim }}"

    - name: Show deployer IP that will be whitelisted
      debug:
        msg: "Deployer IP: {{ deployer_ip }} - will be whitelisted in UFW and fail2ban"

    # =========================================================================
    # UFW PRE-FLIGHT — whitelist deployer IP immediately.
    #
    # On a re-run the server may already have UFW active with default-deny
    # from a previous partial run. If we don't whitelist first, the next
    # task that requires a NEW SSH connection (e.g. async apt) will be
    # blocked by UFW and time out, locking us out.
    # =========================================================================

    - name: UFW pre-flight — install ufw if missing
      apt:
        name: ufw
        state: present

    - name: UFW pre-flight — whitelist deployer IP before any other changes
      ufw:
        rule: allow
        from_ip: "{{ deployer_ip }}"
        comment: "Deployer - unrestricted access (pre-flight)"

    - name: UFW pre-flight — ensure SSH port 22 is open
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    # =========================================================================
    # PACKAGES
    #
    # Run synchronously — async tasks spawn a new SSH connection to poll
    # which can be blocked by UFW's default-deny on a re-run.
    # With ServerAliveInterval=30 in ansible.cfg the SSH connection survives
    # the 5–15 min this takes without needing async.
    # =========================================================================

    - name: Update apt cache and upgrade all packages to latest
      apt:
        upgrade: dist
        update_cache: yes
        cache_valid_time: 3600
      register: apt_upgrade

    - name: Check if reboot is required after upgrade
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Warn if reboot required
      debug:
        msg: "⚠  Reboot required — run: ssh {{ admin_user }}@HOST 'sudo reboot'"
      when: reboot_required_file.stat.exists

    - name: Install server packages
      apt:
        name: "{{ system_packages }}"
        state: present

    # =========================================================================
    # EBS DATA VOLUME
    # Mount the data EBS at apps_root so all app code lives on persistent
    # storage that survives instance termination.
    # =========================================================================

    - name: Wait for EBS data volume (NVMe device)
      wait_for:
        path: "{{ ebs_nvme_device }}"
        state: present
        timeout: 120

    - name: Check if EBS volume already has a filesystem
      command: "blkid {{ ebs_nvme_device }}"
      register: ebs_formatted
      failed_when: false
      changed_when: false

    - name: Create XFS filesystem on EBS data volume (first run only)
      command: "mkfs.xfs -f {{ ebs_nvme_device }}"
      when: ebs_formatted.rc != 0

    - name: Get EBS volume UUID
      command: "blkid -s UUID -o value {{ ebs_nvme_device }}"
      register: ebs_uuid
      changed_when: false

    - name: Create apps root mount point
      file:
        path: "{{ apps_root }}"
        state: directory
        mode: '0755'

    - name: Mount EBS at apps_root and persist via fstab
      mount:
        path: "{{ apps_root }}"
        src: "UUID={{ ebs_uuid.stdout }}"
        fstype: xfs
        opts: defaults,nofail
        state: mounted

    # Setgid (2xxx) ensures new files/dirs in apps_root inherit the group,
    # so both the admin user and app runtime users can read/write their dirs.
    - name: Set apps_root ownership (admin user, setgid)
      file:
        path: "{{ apps_root }}"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '2755'
        state: directory

    - name: Create shared log root directory
      file:
        path: "{{ logs_root }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    # =========================================================================
    # SSH HARDENING
    #
    # Ubuntu 24.04 uses an Include directive in sshd_config that pulls in
    # /etc/ssh/sshd_config.d/*.conf — cloud-init writes its own file there
    # (50-cloud-init.conf) which can conflict with edits to the main file.
    # We write a single drop-in that overrides everything cleanly, so there
    # is no ambiguity about which file "wins".
    # =========================================================================

    - name: SSH — Remove cloud-init ssh config override (we manage this)
      file:
        path: /etc/ssh/sshd_config.d/50-cloud-init.conf
        state: absent

    - name: SSH — Write hardening drop-in config
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        owner: root
        group: root
        mode: '0600'
        content: |
          # Managed by Ansible — do not edit manually.
          # Overrides: /etc/ssh/sshd_config and any cloud-init defaults.

          # Key-only authentication
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          KbdInteractiveAuthentication no
          PubkeyAuthentication yes

          # No root login
          PermitRootLogin no

          # Limit brute-force surface
          MaxAuthTries 3
          MaxSessions 5

          # Reduce idle connection timeout (5 min)
          ClientAliveInterval 300
          ClientAliveCountMax 2

          # No interactive forwarding
          X11Forwarding no
          AllowAgentForwarding no
          AllowTcpForwarding no

    - name: SSH — Validate sshd config before restarting
      command: sshd -t
      changed_when: false

    # Restart sshd async so Ansible doesn't lose the connection mid-restart.
    # After the restart fires we wait_for_connection to confirm SSH came back.
    - name: SSH — Restart sshd (async to avoid dropping current connection)
      service:
        name: ssh
        state: restarted
      async: 60
      poll: 0

    - name: SSH — Wait for sshd to come back after restart
      wait_for_connection:
        delay: 5
        sleep: 5
        timeout: 120

    # =========================================================================
    # AUTOMATIC SECURITY UPDATES
    # =========================================================================

    - name: Configure unattended-upgrades (security patches only)
      template:
        src: ../templates/50unattended-upgrades.j2
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        owner: root
        group: root
        mode: '0644'

    - name: Enable automatic update downloads and installs
      template:
        src: ../templates/20auto-upgrades.j2
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: '0644'

    # =========================================================================
    # KERNEL HARDENING (sysctl)
    # =========================================================================

    - name: Apply kernel security parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        # Reverse path filtering — blocks IP spoofing
        - { name: 'net.ipv4.conf.all.rp_filter',              value: '1' }
        - { name: 'net.ipv4.conf.default.rp_filter',          value: '1' }
        # Ignore broadcast ICMP — prevents smurf attacks
        - { name: 'net.ipv4.icmp_echo_ignore_broadcasts',     value: '1' }
        # Disable source routing — prevents routing table manipulation
        - { name: 'net.ipv4.conf.all.accept_source_route',    value: '0' }
        - { name: 'net.ipv6.conf.all.accept_source_route',    value: '0' }
        - { name: 'net.ipv4.conf.default.accept_source_route', value: '0' }
        - { name: 'net.ipv6.conf.default.accept_source_route', value: '0' }
        # Disable ICMP redirects — prevents MITM routing attacks
        - { name: 'net.ipv4.conf.all.send_redirects',         value: '0' }
        - { name: 'net.ipv4.conf.default.send_redirects',     value: '0' }
        - { name: 'net.ipv4.conf.all.accept_redirects',       value: '0' }
        - { name: 'net.ipv6.conf.all.accept_redirects',       value: '0' }
        # SYN flood protection
        - { name: 'net.ipv4.tcp_syncookies',                  value: '1' }
        - { name: 'net.ipv4.tcp_max_syn_backlog',             value: '2048' }
        - { name: 'net.ipv4.tcp_synack_retries',              value: '2' }
        - { name: 'net.ipv4.tcp_syn_retries',                 value: '5' }
        # Log martian packets (source address spoofing)
        - { name: 'net.ipv4.conf.all.log_martians',           value: '1' }
        - { name: 'net.ipv4.conf.default.log_martians',       value: '1' }
        # Disable IPv6 if not in use
        - { name: 'net.ipv6.conf.all.disable_ipv6',           value: '1' }
        - { name: 'net.ipv6.conf.default.disable_ipv6',       value: '1' }

    - name: Harden /run/shm (shared memory — noexec, nosuid)
      lineinfile:
        path: /etc/fstab
        line: 'tmpfs /run/shm tmpfs defaults,noexec,nosuid 0 0'
        state: present

    # =========================================================================
    # FAIL2BAN — Brute-force protection
    # =========================================================================

    - name: Deploy fail2ban configuration (SSH brute-force protection)
      template:
        src: ../templates/jail.local.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
      notify: restart fail2ban

    - name: Ensure fail2ban is running and enabled
      service:
        name: fail2ban
        state: started
        enabled: yes

    # =========================================================================
    # UFW FIREWALL (defense-in-depth alongside AWS Security Group)
    # =========================================================================

    - name: UFW - Default deny all inbound
      ufw:
        default: deny
        direction: incoming

    - name: UFW - Default allow all outbound
      ufw:
        default: allow
        direction: outgoing

    - name: UFW - Allow ALL traffic from deployer IP (prevents lockout)
      ufw:
        rule: allow
        from_ip: "{{ deployer_ip }}"
        comment: "Deployer - unrestricted access"

    - name: UFW - Allow SSH (port 22)
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: UFW - Allow HTTP (port 80)
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: UFW - Allow HTTPS (port 443)
      ufw:
        rule: allow
        port: '443'
        proto: tcp

    - name: UFW - Enable firewall
      ufw:
        state: enabled

    # =========================================================================
    # DISABLE UNUSED SERVICES
    # =========================================================================

    - name: Stop and disable unused services
      service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - apache2
        - avahi-daemon
        - cups
        - bluetooth
      ignore_errors: yes


    # =========================================================================
    # SUPERVISOR — Shared process manager
    # Installed and running; empty of programs.
    # Each app deployment adds its own .conf to /etc/supervisor/conf.d/.
    # =========================================================================

    - name: Ensure supervisor is started and enabled
      service:
        name: supervisor
        state: started
        enabled: yes

    # =========================================================================
    # SYSTEM LOGGING
    # =========================================================================

    - name: Ensure rsyslog is installed and running
      service:
        name: rsyslog
        state: started
        enabled: yes

    - name: Configure system log rotation
      template:
        src: ../templates/rsyslog-rotation.j2
        dest: /etc/logrotate.d/rsyslog
        owner: root
        group: root
        mode: '0644'

    # =========================================================================
    # SUMMARY
    # =========================================================================

    - name: Display server hardening summary
      debug:
        msg: |

          ╔══════════════════════════════════════════════════════════╗
          ║   Server Foundation Ready - {{ host_name }}
          ╚══════════════════════════════════════════════════════════╝

            EBS Volume:
              Device:    {{ ebs_nvme_device }}
              Mount:     {{ apps_root }}  (all app code + data)
              Logs:      {{ logs_root }}  (all app logs)
              Size:      {{ ebs_volume_size }} GB {{ ebs_volume_type }}
              Encrypted: {{ ebs_volume_encrypted }}

            Security:
              SSH         - key-only auth, no root, 3 retries, 5-min idle timeout
              UFW         - default deny; ports 22, 80, 443 open
              Sysctl      - IP spoofing, SYN flood, redirect mitigations
              Auto-update - unattended security patches enabled
              Fail2ban    - SSH brute-force protection active
              /run/shm    - noexec, nosuid

            Shared services:
              supervisor - running, no programs (apps add their own)
              rsyslog    - system logging active

            Deploy an app:
              ansible-playbook playbooks/setup.yml --vault-password-file ~/.vault_pass

          {{ '  ⚠  REBOOT REQUIRED - run: sudo reboot' if reboot_required_file.stat.exists else '  No reboot required.' }}

  handlers:

    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted

