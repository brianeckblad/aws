---
# Playbook to delete SSH key pair from AWS and local machine
# Counterpart to: create-ssh-key.yml
#
# Usage: ansible-playbook playbooks/delete-ssh-key.yml --vault-password-file ~/.vault_pass
#
# To recreate: ansible-playbook playbooks/create-ssh-key.yml --vault-password-file ~/.vault_pass

- name: Delete SSH Key Pair
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Delete SSH key pair from AWS
      amazon.aws.ec2_key:
        name: "{{ ssh_key_name }}"
        region: "{{ aws_region }}"
        state: absent

    - name: Delete local SSH key file
      file:
        path: "{{ ssh_key_file }}"
        state: absent

    - name: Remove server entry from ~/.ssh/config
      environment:
        SSH_HOST: "{{ host_name }}"
      shell: |
        python3 << 'PYEOF'
        import os, pathlib, re
        host = os.environ['SSH_HOST']

        config_path = pathlib.Path.home() / '.ssh' / 'config'
        if not config_path.exists():
            exit(0)
        content = config_path.read_text()

        # Remove stale ANSIBLE MANAGED marker lines for this host
        content = re.sub(rf'(?m)^# (?:BEGIN|END) ANSIBLE MANAGED — {re.escape(host)}\n', '', content)
        # Remove Host block for this host
        content = re.sub(rf'(?m)^Host {re.escape(host)}\n(?:[ \t]+[^\n]*\n)*', '', content)
        content = re.sub(r'\n{3,}', '\n\n', content).strip()
        config_path.write_text((content + '\n') if content else '')
        PYEOF
      failed_when: false
      delegate_to: localhost
      become: no
      changed_when: true

    - name: Display result
      debug:
        msg:
          - "✓ SSH key pair deleted from AWS: {{ ssh_key_name }}"
          - "✓ Local key file removed: {{ ssh_key_file }}"
          - ""
          - "To recreate:"
          - "  ansible-playbook playbooks/create-ssh-key.yml --vault-password-file ~/.vault_pass"
