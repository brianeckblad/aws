---
# update-server.yml — Apply system changes to a running server
#
# Use this after the server is already provisioned to:
#   - Upgrade OS packages
#   - Install any newly added system_packages
#   - Re-apply fail2ban, sysctl, SSH hardening config (idempotent)
#   - Update the security group SSH rule to the current deployer IP
#   - Reload/restart services as needed
#   - Reboot if a new kernel was installed
#
# Safe to re-run at any time. Skips initial-setup-only tasks
# (EBS formatting, volume mounting, service installation).
#
# Usage:
#   ansible-playbook playbooks/update-server.yml \
#     --vault-password-file ~/.vault_pass

# ============================================================================
# Phase 1 (localhost): Update the security group SSH rule
# ============================================================================
- name: Update Security Group SSH Rule
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Detect deployer public IP
      ansible.builtin.command: curl -4 -s --max-time 10 ifconfig.me
      register: deployer_ip_raw
      changed_when: false

    - name: Set SSH CIDR fact
      set_fact:
        ssh_cidr: "{{ ssh_allowed_cidr | default(deployer_ip_raw.stdout | trim + '/32') }}"

    - name: Look up default VPC
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          isDefault: "true"
      register: default_vpc

    - name: Update security group SSH rule to current deployer IP
      amazon.aws.ec2_security_group:
        name: "{{ security_group_name }}"
        description: "{{ host_name }} shared server - managed by Ansible"
        region: "{{ aws_region }}"
        vpc_id: "{{ vpc_id | default(default_vpc.vpcs[0].vpc_id) }}"
        rules:
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: "{{ ssh_cidr }}"
            rule_desc: "SSH - restricted to {{ ssh_cidr }}"
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: 0.0.0.0/0
            rule_desc: "HTTP"
          - proto: tcp
            from_port: 443
            to_port: 443
            cidr_ip: 0.0.0.0/0
            rule_desc: "HTTPS"

    - name: Show SSH restriction update
      debug:
        msg: "✓ Security group SSH rule updated — port 22 restricted to {{ ssh_cidr }}"

# ============================================================================
# Phase 2 (remote server): OS packages and config
# ============================================================================
- name: Update Server — OS packages and configuration
  hosts: all
  become: yes
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  vars:
    system_packages:
      # Core utilities
      - curl
      - git
      - unzip
      - htop
      - net-tools
      # Security
      - ufw
      - fail2ban
      - unattended-upgrades
      # Process management
      - supervisor
      # Python runtime
      - python3
      - python3-pip
      - python3-venv
      # Logging
      - rsyslog
      - logrotate
      # Filesystem / EBS tools (XFS for data volume)
      - nvme-cli
      - xfsprogs

  pre_tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        delay: 5
        sleep: 10
        timeout: 300

    - name: Gather facts
      gather_facts:

  tasks:

    # =========================================================================
    # UFW PRE-FLIGHT — whitelist deployer IP before anything else
    # =========================================================================

    - name: Get deployer public IP
      command: curl -4 -s --max-time 10 ifconfig.me
      register: deployer_ip_raw
      delegate_to: localhost
      become: no
      changed_when: false

    - name: Set deployer IP fact
      set_fact:
        deployer_ip: "{{ deployer_ip_raw.stdout | trim }}"

    - name: UFW pre-flight — whitelist deployer IP
      ufw:
        rule: allow
        from_ip: "{{ deployer_ip }}"
        comment: "Deployer - unrestricted access"

    - name: UFW pre-flight — ensure SSH port 22 is open
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    # =========================================================================
    # PACKAGES
    # =========================================================================

    - name: Update apt cache and upgrade all packages
      apt:
        upgrade: dist
        update_cache: yes
        cache_valid_time: 0
      register: apt_upgrade

    - name: Ensure all system packages are present
      apt:
        name: "{{ system_packages }}"
        state: present

    - name: Remove unused packages
      apt:
        autoremove: yes
        purge: yes

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    # =========================================================================
    # SSH HARDENING — re-apply drop-in config
    # =========================================================================

    - name: SSH — Remove cloud-init override
      file:
        path: /etc/ssh/sshd_config.d/50-cloud-init.conf
        state: absent

    - name: SSH — Write hardening drop-in config
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        owner: root
        group: root
        mode: '0600'
        content: |
          # Managed by Ansible — do not edit manually.
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          KbdInteractiveAuthentication no
          PubkeyAuthentication yes
          PermitRootLogin no
          MaxAuthTries 3
          MaxSessions 5
          ClientAliveInterval 300
          ClientAliveCountMax 2
          X11Forwarding no
          AllowAgentForwarding no
          AllowTcpForwarding no

    - name: SSH — Validate config before restarting
      command: sshd -t
      changed_when: false

    - name: SSH — Restart sshd async
      service:
        name: ssh
        state: restarted
      async: 60
      poll: 0

    - name: SSH — Wait for sshd to come back
      wait_for_connection:
        delay: 5
        sleep: 5
        timeout: 120

    # =========================================================================
    # AUTOMATIC SECURITY UPDATES
    # =========================================================================

    - name: Configure unattended-upgrades
      template:
        src: ../templates/50unattended-upgrades.j2
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        owner: root
        group: root
        mode: '0644'

    - name: Enable automatic update downloads and installs
      template:
        src: ../templates/20auto-upgrades.j2
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: '0644'

    # =========================================================================
    # KERNEL HARDENING — re-apply sysctl params
    # =========================================================================

    - name: Apply kernel security parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: 'net.ipv4.conf.all.rp_filter',               value: '1' }
        - { name: 'net.ipv4.conf.default.rp_filter',           value: '1' }
        - { name: 'net.ipv4.icmp_echo_ignore_broadcasts',      value: '1' }
        - { name: 'net.ipv4.conf.all.accept_source_route',     value: '0' }
        - { name: 'net.ipv6.conf.all.accept_source_route',     value: '0' }
        - { name: 'net.ipv4.conf.default.accept_source_route', value: '0' }
        - { name: 'net.ipv6.conf.default.accept_source_route', value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects',          value: '0' }
        - { name: 'net.ipv4.conf.default.send_redirects',      value: '0' }
        - { name: 'net.ipv4.conf.all.accept_redirects',        value: '0' }
        - { name: 'net.ipv6.conf.all.accept_redirects',        value: '0' }
        - { name: 'net.ipv4.tcp_syncookies',                   value: '1' }
        - { name: 'net.ipv4.tcp_max_syn_backlog',              value: '2048' }
        - { name: 'net.ipv4.tcp_synack_retries',               value: '2' }
        - { name: 'net.ipv4.tcp_syn_retries',                  value: '5' }
        - { name: 'net.ipv4.conf.all.log_martians',            value: '1' }
        - { name: 'net.ipv4.conf.default.log_martians',        value: '1' }
        - { name: 'net.ipv6.conf.all.disable_ipv6',            value: '1' }
        - { name: 'net.ipv6.conf.default.disable_ipv6',        value: '1' }

    # =========================================================================
    # FAIL2BAN
    # =========================================================================

    - name: Update fail2ban configuration
      template:
        src: ../templates/jail.local.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
      notify: restart fail2ban

    - name: Ensure fail2ban is running and enabled
      service:
        name: fail2ban
        state: started
        enabled: yes

    # =========================================================================
    # LOGGING
    # =========================================================================

    - name: Update log rotation config
      template:
        src: ../templates/rsyslog-rotation.j2
        dest: /etc/logrotate.d/rsyslog
        owner: root
        group: root
        mode: '0644'

    - name: Ensure rsyslog is running and enabled
      service:
        name: rsyslog
        state: started
        enabled: yes

    # =========================================================================
    # REBOOT if kernel was updated
    # =========================================================================

    - name: Reboot if kernel upgrade requires it
      ansible.builtin.reboot:
        msg: "Rebooting after kernel upgrade"
        pre_reboot_delay: 5
        post_reboot_delay: 15
        reboot_timeout: 300
        connect_timeout: 20
        test_command: uptime
      when: reboot_required_file.stat.exists

    # =========================================================================
    # SUMMARY
    # =========================================================================

    - name: Display update summary
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   ✓ Server Updated - {{ host_name }}"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "  ✓ Packages:   upgraded + autoremoved"
          - "  ✓ SSH config: re-applied (drop-in 99-hardening.conf)"
          - "  ✓ sysctl:     re-applied"
          - "  ✓ fail2ban:   config updated"
          - "  ✓ logrotate:  config updated"
          - ""
          - "  {{ '✓ Rebooted — new kernel active.' if reboot_required_file.stat.exists else '✓ No reboot required.' }}"

  handlers:
    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted
