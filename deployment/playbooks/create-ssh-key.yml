---
# create-ssh-key.yml — SSH key pair for the shared EC2 server
#
# Creates one key pair for the entire server (not per-app).
# The key is named host_name-key and stored at ~/.ssh/host_name-key.pem.
#
# SECURITY:
#   - Private key is generated once and stored locally only
#   - AWS does not keep a copy — never lose this file
#   - Permissions are set to 0400 (owner read-only)
#   - Never commit the .pem file to git
#
# Recovery if key is lost:
#   1. AWS Systems Manager Session Manager (no SSH key required)
#   2. Create an AMI snapshot → launch replacement instance with new key
#
# Usage: ansible-playbook playbooks/create-ssh-key.yml \
#          --vault-password-file ~/.vault_pass

- name: Create SSH Key Pair for Shared Server
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Ensure ~/.ssh directory exists
      file:
        path: "~/.ssh"
        state: directory
        mode: '0700'

    - name: Check if SSH key already exists locally
      stat:
        path: "{{ ssh_key_file }}"
      register: ssh_key_file_stat

    - name: Create SSH key pair in AWS
      amazon.aws.ec2_key:
        name: "{{ ssh_key_name }}"
        region: "{{ aws_region }}"
        state: present
        tags:
          Server: "{{ host_name }}"
          Environment: production
          ManagedBy: Ansible
      register: key_pair

    - name: Save private key locally (only on first creation)
      copy:
        content: "{{ key_pair.key.private_key }}"
        dest: "{{ ssh_key_file }}"
        mode: '0400'
        backup: yes
      when: key_pair.changed

    - name: Enforce correct key file permissions
      file:
        path: "{{ ssh_key_file }}"
        mode: '0400'
        state: file
      when: ssh_key_file_stat.stat.exists or key_pair.changed

    - name: Read current server IP from inventory (if a server already exists)
      shell: >
        grep 'ansible_host:' {{ playbook_dir }}/../inventories/hosts.yml
        | awk '{print $2}' | head -1 | tr -d '[:space:]'
      register: inventory_ip_raw
      changed_when: false
      failed_when: false

    - name: Set SSH config HostName fact
      set_fact:
        ssh_config_hostname: >-
          {{ inventory_ip_raw.stdout | trim
             if (inventory_ip_raw.stdout | trim) not in ['', 'localhost', '127.0.0.1']
             else '' }}

    - name: Ensure ~/.ssh/config exists with correct permissions
      file:
        path: "{{ lookup('env', 'HOME') }}/.ssh/config"
        state: touch
        mode: '0600'
        modification_time: preserve
        access_time: preserve

    - name: Update ~/.ssh/config — server entry
      environment:
        SSH_HOST: "{{ host_name }}"
        SSH_HOSTNAME: "{{ ssh_config_hostname }}"
        SSH_USER: "{{ admin_user }}"
        SSH_KEYFILE: "{{ ssh_key_file }}"
      shell: |
        python3 << 'PYEOF'
        import os, pathlib, re
        host     = os.environ['SSH_HOST']
        hostname = os.environ.get('SSH_HOSTNAME', '').strip()
        user     = os.environ['SSH_USER']
        keyfile  = os.environ['SSH_KEYFILE']

        config_path = pathlib.Path.home() / '.ssh' / 'config'
        config_path.parent.mkdir(mode=0o700, exist_ok=True)
        config_path.touch(mode=0o600, exist_ok=True)
        content = config_path.read_text()

        # Remove stale ANSIBLE MANAGED marker lines for this host
        content = re.sub(rf'(?m)^# (?:BEGIN|END) ANSIBLE MANAGED — {re.escape(host)}\n', '', content)
        # Remove existing Host block for this host
        content = re.sub(rf'(?m)^Host {re.escape(host)}\n(?:[ \t]+[^\n]*\n)*', '', content)
        content = re.sub(r'\n{3,}', '\n\n', content).strip()

        lines = [f'Host {host}']
        if hostname:
            lines.append(f'    HostName {hostname}')
        lines += [
            f'    User {user}',
            f'    IdentityFile {keyfile}',
            f'    IdentitiesOnly yes',
            f'    ServerAliveInterval 60',
            f'    ServerAliveCountMax 10',
        ]
        new_block = '\n'.join(lines) + '\n'
        content = (content + '\n\n' + new_block) if content else new_block
        config_path.write_text(content)
        PYEOF
      delegate_to: localhost
      become: no
      changed_when: true

    - name: Get key fingerprint from AWS
      amazon.aws.ec2_key_info:
        names:
          - "{{ ssh_key_name }}"
        region: "{{ aws_region }}"
      register: key_info

    - name: Display SSH key summary
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   ✓ SSH Key Created - {{ host_name }}"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "  Key pair:   {{ ssh_key_name }}"
          - "  Fingerprint: {{ key_info.keys[0].key_fingerprint | default('N/A') }}"
          - "  Local file:  {{ ssh_key_file }}  (mode 0400)"
          - ""
          - "  SSH access:"
          - "    ssh -i {{ ssh_key_file }} ubuntu@<SERVER_IP>"
          - ""
          - "  ⚠  Keep this key safe — there is no recovery without it"
          - "     (unless AWS Systems Manager Session Manager is configured)"
