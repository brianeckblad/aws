[defaults]
inventory               = inventories/hosts.yml
host_key_checking       = False
retry_files_enabled     = False
gathering               = smart
fact_caching            = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout    = 3600
stdout_callback         = default
callbacks_enabled       = profile_tasks, timer
deprecation_warnings    = False

# Ignore generated/example files when -i is passed a directory
inventory_ignore_extensions = ~, .orig, .bak, .ini, .cfg, .retry, .pyc, .pyo, .example

# vault-password.sh properly expands ~ where ansible.cfg cannot
vault_password_file = scripts/vault-password.sh
vault_identity       = default
vault_editor         = nano

[privilege_escalation]
become_method   = sudo
become_user     = root
become_ask_pass = False

[ssh_connection]
# ConnectTimeout — how long to wait for the initial TCP handshake
# ServerAliveInterval/CountMax — send keepalives every 30s so long-running
#   tasks (apt upgrade, package installs) don't drop the SSH connection.
#   30s * 20 = 10 minutes of silence allowed before giving up.
timeout    = 60
pipelining = True
ssh_args   = -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=20
